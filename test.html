<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EDA Test</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #e6f7ff 100%); }
        .test-card { 
            background: white; 
            padding: 20px; 
            margin: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn { 
            background: #1890FF; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="test-card">
        <h1>✅ 样式加载成功！</h1>
        <p>如果看到这个蓝色按钮，说明CSS样式正常工作。</p>
        <button class="btn">测试按钮</button>
    </div>
</body>
</html>
