<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDA - 登录</title>
    <style>
        /* 重置和基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #262626;
            background-color: #fff;
        }
        
        /* 导航栏样式 */
        .navbar {
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #2E8B57; /* EDA 绿色 */
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 24px;
        }
        
        .nav-link {
            color: #262626;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
        }
        
        .nav-link.active, .nav-link:hover {
            color: #2E8B57; /* EDA 绿色 */
        }
        
        .search-bar {
            display: flex;
            align-items: center;
            background-color: #f5f5f5;
            border-radius: 4px;
            padding: 8px 12px;
            width: 240px;
        }
        
        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            margin-left: 8px;
            font-size: 14px;
        }
        
        /* 登录页 */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 120px);
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f7ff 100%);
        }
        
        .login-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            padding: 48px;
            width: 100%;
            max-width: 480px;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo h2 {
            font-size: 24px;
            font-weight: 700;
            color: #2E8B57; /* EDA 绿色 */
            margin-top: 16px;
        }
        
        .login-subtitle {
            text-align: center;
            color: #595959;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #2E8B57; /* EDA 绿色 */
            box-shadow: 0 0 0 2px rgba(46, 139, 87, 0.2);
        }
        
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .forgot-password {
            color: #2E8B57; /* EDA 绿色 */
            text-decoration: none;
            font-size: 14px;
        }
        
        .action-btn {
            background-color: #2E8B57; /* EDA 绿色 */
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        
        .action-btn:hover {
            background-color: #228B22; /* 深绿色 */
        }
        
        .social-login {
            margin-top: 24px;
            text-align: center;
        }
        
        .social-login-title {
            margin-bottom: 16px;
            color: #595959;
            position: relative;
            display: inline-block;
            padding: 0 20px;
            background: white;
        }
        
        .social-login-title::before,
        .social-login-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 1px;
            background-color: #d9d9d9;
        }
        
        .social-login-title::before {
            left: -35px;
        }
        
        .social-login-title::after {
            right: -35px;
        }
        
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
        }
        
        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 20px;
        }
        
        .social-btn:hover {
            background-color: #e8e8e8;
        }
        
        .register-link {
            text-align: center;
            margin-top: 24px;
            color: #595959;
        }
        
        .register-link a {
            color: #2E8B57; /* EDA 绿色 */
            text-decoration: none;
            font-weight: 500;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        /* 页脚 */
        .footer {
            background-color: #f9f9f9;
            padding: 48px 0 24px;
            margin-top: 48px;
        }
        
        .footer-content {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 32px;
            margin-bottom: 32px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }
        
        .footer-column h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .footer-link {
            color: #595959;
            text-decoration: none;
            font-size: 14px;
        }
        
        .footer-link:hover {
            color: #2E8B57; /* EDA 绿色 */
        }
        
        .footer-bottom {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid #e8e8e8;
            color: #8c8c8c;
            font-size: 14px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .login-card {
                padding: 32px;
            }
            
            .footer-content {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .nav-links {
                display: none;
            }
            
            .search-bar {
                width: 160px;
            }
            
            .footer-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="search.html" class="logo">EDA</a>
            <div class="nav-links">
                <a href="search.html" class="nav-link">首页</a>
                <a href="search.html" class="nav-link">课程频道</a>
                <a href="#" class="nav-link">前沿资讯</a>
                <a href="#" class="nav-link">共创未来</a>
                <a href="#" class="nav-link">技能变现</a>
            </div>
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" placeholder="搜索">
            </div>
            <div class="auth-buttons">
                <a href="#" class="btn">登录/注册</a>
            </div>
        </div>
    </nav>

    <!-- 登录页 -->
    <section class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div style="font-size: 48px;">🎓</div>
                <h2>Edmodo Academy</h2>
            </div>
            
            <p class="login-subtitle">登录你的账户继续学习</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">邮箱/手机号</label>
                    <input type="text" class="form-input" placeholder="请输入邮箱或手机号">
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" placeholder="请输入密码">
                </div>
                
                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox"> 记住我
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>
                
                <button type="submit" class="action-btn">登录</button>
            </form>
            
            <div class="social-login">
                <div class="social-login-title">其他登录方式</div>
                <div class="social-buttons">
                    <div class="social-btn">📱</div>
                    <div class="social-btn">🍎</div>
                    <div class="social-btn">G</div>
                </div>
            </div>
            
            <div class="register-link">
                还没有账户？<a href="#">立即注册</a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-column">
                <h4>学习新知识</h4>
                <div class="footer-links">
                    <a href="search.html" class="footer-link">热门</a>
                    <a href="search.html" class="footer-link">专业提升</a>
                    <a href="search.html" class="footer-link">职场技能</a>
                    <a href="search.html" class="footer-link">社会教育</a>
                    <a href="search.html" class="footer-link">兴趣爱好</a>
                </div>
            </div>
            
            <div class="footer-column">
                <h4>产品与服务</h4>
                <div class="footer-links">
                    <a href="#" class="footer-link">学习目标百科</a>
                    <a href="#" class="footer-link">EDA新视听创作大赛</a>
                </div>
            </div>
            
            <div class="footer-column">
                <h4>法律与合规</h4>
                <div class="footer-links">
                    <a href="#" class="footer-link">用户协议</a>
                    <a href="#" class="footer-link">隐私政策</a>
                </div>
            </div>
            
            <div class="footer-column">
                <h4>关注我们</h4>
                <div class="footer-links">
                    <a href="#" class="footer-link">微信公众号</a>
                    <a href="#" class="footer-link">联系我们</a>
                </div>
            </div>
        </div>
        
        <div class="footer-bottom">
            Copyright © 2022 EDA All Rights Reserved. 闽ICP备12022411号-7 联系方式：edacn@101.com
        </div>
    </footer>

    <script>
        // 交互功能
        document.addEventListener('DOMContentLoaded', function() {
            // 表单提交
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    alert('登录成功！');
                });
            }
            
            // 导航链接激活
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    navLinks.forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
